    <script>
        //call functions//


      // Simple client-side chat simulation
let currentUser = '';
let currentRoom = '';
let isConnected = false;

function connect() {
    const username = document.getElementById('usernameInput').value.trim();
    const room = document.getElementById('roomInput').value.trim();

    if (!username || !room) {
        alert('Please enter both username and room.');
        return;
    }

    currentUser = username;
    currentRoom = room;

    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('chatSection').style.display = 'flex';
    document.getElementById('roomName').textContent = room;

    isConnected = true;

    // Add system message
    addMessage('system', `WELCOME TO THE HACKER CLASS CHAT SYSTEM. YOU HAVE JOINED ROOM "${room}"`);
    addMessage('system', `${username} has joined the room.`);

    // Add current user to member list
    addMember(username);
    updateCounts();
}

function leaveRoom() {
    if (!isConnected) return;

    addMessage('system', `${currentUser} has left the room.`);
    isConnected = false;

    document.getElementById('chatSection').style.display = 'none';
    document.getElementById('loginSection').style.display = 'flex';

    // Clear members
    document.getElementById('memberList').innerHTML = '';
    document.getElementById('messages').innerHTML = '';
    currentUser = '';
    currentRoom = '';
}

function sendMessage() {
    if (!isConnected) return;

    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    addMessage('self', text, currentUser);
    input.value = '';
}

function addMessage(type, text, username) {
    const messagesDiv = document.getElementById('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${type}`;

    if (type === 'system') {
        msgDiv.innerHTML = `<div class="message-body">// ${text} //</div>`;
    } else {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        msgDiv.innerHTML = `
            <div class="message-header">
                <span>${username || currentUser}</span>
                <span class="time">${time}</span>
            </div>
            <div class="message-body">${text}</div>
        `;
    }

    messagesDiv.appendChild(msgDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addMember(name) {
    const memberList = document.getElementById('memberList');
    const memberDiv = document.createElement('div');
    memberDiv.className = 'member-item';
    memberDiv.textContent = name;
    memberList.appendChild(memberDiv);
}

function updateCounts() {
    const count = document.getElementById('memberList').children.length;
    document.getElementById('onlineCount').textContent = `ONLINE: ${count}`;
    document.getElementById('memberCount').textContent = `MEMBERS: ${count}`;
}
//ADD PEER CONNECTION (IMPORTANT)//
let peerConnection;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};
//CREATE PEER FUNCTION//
function createPeer() {
    peerConnection = new RTCPeerConnection(config);

    peerConnection.ontrack = (event) => {
        document.getElementById("remoteVideo").srcObject = event.streams[0];
    };

    peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("ice", event.candidate);
        }
    };
}
    </script>
